<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OASIS Market</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --o1:#0B0907;--o2:#141009;--o3:#1C150D;--o4:#261C11;
  --sand:#C8924A;--sandL:#E8B870;--sandP:#F5D9A8;
  --cream:#F0E8D8;--muted:#A89880;
  --red:#C0392B;--green:#27AE60;--blue:#2980B9;
  --r:10px;--rL:16px;--shadow:0 8px 32px rgba(0,0,0,.5);--glow:0 4px 24px rgba(200,146,74,.25);
  --nav-h:58px;--bot-h:62px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Outfit',sans-serif;background:var(--o1);color:var(--cream);min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--o2)}::-webkit-scrollbar-thumb{background:var(--sand);border-radius:3px}
h1,h2,h3{font-family:'Playfair Display',serif;line-height:1.15}
.tgold{color:var(--sand)}.tmuted{color:var(--muted)}.tsm{font-size:.85rem}.txs{font-size:.75rem}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:10px 20px;border-radius:50px;font-family:'Outfit',sans-serif;font-size:.88rem;font-weight:500;cursor:pointer;border:none;transition:all .2s;white-space:nowrap}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-gold{background:linear-gradient(135deg,var(--sand),var(--sandL));color:var(--o1);font-weight:600}
.btn-gold:hover:not(:disabled){transform:translateY(-2px);box-shadow:var(--glow)}
.btn-ghost{background:rgba(255,255,255,.07);color:var(--cream)}
.btn-ghost:hover{background:rgba(255,255,255,.12)}
.btn-danger{background:var(--red);color:#fff}
.btn-danger:hover{background:#e74c3c}
.btn-success{background:var(--green);color:#fff}
.btn-success:hover{background:#2ecc71}
.btn-blue{background:var(--blue);color:#fff}
.btn-sm{padding:6px 14px;font-size:.78rem}
.btn-full{width:100%}

/* CARD */
.card{background:var(--o2);border:1px solid rgba(200,146,74,.12);border-radius:var(--rL)}
.card-hover{transition:all .25s;cursor:pointer}
.card-hover:hover{border-color:rgba(200,146,74,.35);transform:translateY(-3px);box-shadow:var(--shadow)}

/* FORMS */
.fg{margin-bottom:15px}
.fl{display:block;font-size:.72rem;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:6px}
.fi{width:100%;background:var(--o3);border:1px solid rgba(200,146,74,.18);border-radius:var(--r);padding:11px 15px;color:var(--cream);font-family:'Outfit',sans-serif;font-size:.92rem;outline:none;transition:border-color .2s}
.fi:focus{border-color:var(--sand)}.fi::placeholder{color:var(--muted);opacity:.55}
select.fi option{background:var(--o3)}
textarea.fi{resize:vertical;min-height:85px}
.ferr{font-size:.78rem;color:#e74c3c;margin-top:5px;display:none}
.ferr.show{display:block}

/* BADGE */
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 9px;border-radius:50px;font-size:.7rem;font-weight:600}
.bg-gold{background:rgba(200,146,74,.2);color:var(--sandL)}
.bg-green{background:rgba(39,174,96,.2);color:#2ecc71}
.bg-red{background:rgba(192,57,43,.2);color:#e74c3c}
.bg-gray{background:rgba(255,255,255,.08);color:var(--muted)}
.bg-blue{background:rgba(41,128,185,.2);color:#5dade2}

/* TOP NAV */
#topbar{position:fixed;top:0;left:0;right:0;z-index:500;background:rgba(11,9,7,.97);backdrop-filter:blur(16px);border-bottom:1px solid rgba(200,146,74,.12);height:var(--nav-h);display:flex;align-items:center;justify-content:space-between;padding:0 16px;gap:10px}
.tlogo{font-family:'Playfair Display',serif;font-size:1.15rem;font-weight:900;color:var(--sand)}
.tlogo span{color:var(--muted);font-family:Outfit,sans-serif;font-weight:300;font-size:.6em}
.tbr{display:flex;align-items:center;gap:7px}
.av{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--sand),var(--sandL));color:var(--o1);font-weight:700;font-size:.78rem;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.av-lg{width:44px;height:44px;font-size:.95rem}
.av-xl{width:56px;height:56px;font-size:1.2rem}
.notif-btn{background:rgba(200,146,74,.1);border:1px solid rgba(200,146,74,.2);border-radius:50%;width:34px;height:34px;cursor:pointer;font-size:.9rem;position:relative;color:var(--cream);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ndot{display:none;position:absolute;top:4px;right:4px;width:7px;height:7px;border-radius:50%;background:var(--red)}

/* BOTTOM NAV (mobile) */
#botnav{position:fixed;bottom:0;left:0;right:0;z-index:500;background:rgba(11,9,7,.97);backdrop-filter:blur(16px);border-top:1px solid rgba(200,146,74,.12);height:var(--bot-h);display:flex;align-items:center}
.bn-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:8px 4px;transition:all .2s;position:relative}
.bn-item .bni{font-size:1.3rem;line-height:1}
.bn-item .bnl{font-size:.62rem;color:var(--muted);font-weight:500;transition:color .2s}
.bn-item.active .bnl{color:var(--sand)}
.bn-item.active .bni{filter:drop-shadow(0 0 6px var(--sand))}
.bn-dot{position:absolute;top:6px;right:calc(50% - 14px);width:7px;height:7px;border-radius:50%;background:var(--red);display:none}

/* MAIN CONTENT */
#main{padding-top:calc(var(--nav-h) + 14px);padding-bottom:calc(var(--bot-h) + 14px);padding-left:14px;padding-right:14px;min-height:100vh}

/* SECTION HEADER */
.sh{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px;gap:10px;flex-wrap:wrap}
.st{font-family:'Playfair Display',serif;font-size:1.35rem;font-weight:700}
.ss{font-size:.8rem;color:var(--muted);margin-top:2px}

/* STATS */
.srow{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:18px}
.sc{padding:15px}
.sc-l{font-size:.67rem;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin-bottom:6px}
.sc-v{font-family:'Playfair Display',serif;font-size:1.7rem;font-weight:700;color:var(--sand)}
.sc-n{font-size:.7rem;color:var(--muted);margin-top:1px}

/* SEARCH */
.srch{display:flex;gap:8px;margin-bottom:14px}
.sw{flex:1;position:relative}
.sw-ico{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:.9rem;pointer-events:none}
.si2{width:100%;background:var(--o3);border:1px solid rgba(200,146,74,.18);border-radius:50px;padding:9px 14px 9px 34px;color:var(--cream);font-family:'Outfit',sans-serif;font-size:.86rem;outline:none}
.si2:focus{border-color:var(--sand)}.si2::placeholder{color:var(--muted)}
.csel{background:var(--o3);border:1px solid rgba(200,146,74,.18);border-radius:50px;padding:9px 12px;color:var(--cream);font-family:'Outfit',sans-serif;font-size:.82rem;outline:none;cursor:pointer;max-width:120px}

/* PRODUCTS GRID */
.pg{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
@media(min-width:480px){.pg{grid-template-columns:repeat(3,1fr)}}
@media(min-width:768px){.pg{grid-template-columns:repeat(4,1fr)}}
.pc{overflow:hidden}
.pim{position:relative;height:150px;background:var(--o3);display:flex;align-items:center;justify-content:center;overflow:hidden}
.pim img{width:100%;height:100%;object-fit:cover}
.pph{font-size:2.8rem;opacity:.2}
.pb1{position:absolute;top:6px;left:6px;background:linear-gradient(135deg,var(--sand),var(--sandL));color:var(--o1);font-size:.58rem;font-weight:700;padding:2px 6px;border-radius:4px;text-transform:uppercase}
.pb2{position:absolute;top:6px;right:6px;background:rgba(39,174,96,.85);color:#fff;font-size:.58rem;font-weight:600;padding:2px 6px;border-radius:4px}
.pbody{padding:10px}
.pname{font-family:'Playfair Display',serif;font-weight:700;font-size:.88rem;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.psel{font-size:.7rem;color:var(--muted);margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ppr{font-size:.95rem;font-weight:600;color:var(--sand)}
.pact{display:flex;gap:5px;margin-top:8px}

/* TABLE */
.tw{background:var(--o2);border:1px solid rgba(200,146,74,.1);border-radius:var(--rL);overflow:hidden;overflow-x:auto}
table.dt{width:100%;border-collapse:collapse;min-width:500px}
.dt th{font-size:.65rem;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);padding:10px 13px;text-align:left;border-bottom:1px solid rgba(200,146,74,.1)}
.dt td{padding:10px 13px;border-bottom:1px solid rgba(255,255,255,.03);font-size:.82rem;vertical-align:middle}
.dt tr:last-child td{border-bottom:none}
.tda{display:flex;gap:4px;flex-wrap:wrap}

/* CHAT */
.chat-wrap{background:var(--o2);border:1px solid rgba(200,146,74,.1);border-radius:var(--rL);overflow:hidden;display:flex;flex-direction:column;height:calc(100vh - var(--nav-h) - var(--bot-h) - 80px);min-height:400px}
.conv-list{overflow-y:auto;border-bottom:1px solid rgba(200,146,74,.08)}
.conv-list.hidden{display:none}
.cl-h{padding:12px 14px;font-weight:600;border-bottom:1px solid rgba(200,146,74,.08);font-size:.9rem;display:flex;align-items:center;justify-content:space-between}
.ci{display:flex;align-items:center;gap:9px;padding:11px 13px;border-bottom:1px solid rgba(200,146,74,.05);cursor:pointer;transition:background .15s}
.ci:hover,.ci.active{background:rgba(200,146,74,.08)}
.ci-nm{font-size:.84rem;font-weight:500}
.ci-pv{font-size:.7rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:180px}
.chat-open{display:flex;flex-direction:column;flex:1;overflow:hidden}
.chat-open.hidden{display:none}
.cr-h{padding:11px 13px;border-bottom:1px solid rgba(200,146,74,.08);display:flex;align-items:center;gap:9px}
.back-btn{background:none;border:none;color:var(--sand);cursor:pointer;font-size:1.1rem;padding:2px 6px 2px 0}
.msgs{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px}
.mw{display:flex;flex-direction:column}
.mw.mine{align-items:flex-end}.mw.other{align-items:flex-start}
.mb{max-width:75%;padding:8px 12px;border-radius:12px;font-size:.84rem;line-height:1.5}
.mw.mine .mb{background:linear-gradient(135deg,var(--sand),var(--sandL));color:var(--o1);border-bottom-right-radius:3px}
.mw.other .mb{background:var(--o4);color:var(--cream);border-bottom-left-radius:3px}
.mm{font-size:.64rem;color:var(--muted);margin-top:2px;padding:0 3px}
.mw.mine .mm{text-align:right}
.cmp{padding:10px 12px;border-top:1px solid rgba(200,146,74,.08);display:flex;gap:7px;align-items:center}
.cinp{flex:1;background:var(--o3);border:1px solid rgba(200,146,74,.18);border-radius:50px;padding:9px 14px;color:var(--cream);font-family:'Outfit',sans-serif;font-size:.86rem;outline:none}
.cinp:focus{border-color:var(--sand)}
.csnd{background:linear-gradient(135deg,var(--sand),var(--sandL));border:none;color:var(--o1);width:38px;height:38px;border-radius:50%;cursor:pointer;font-size:.95rem;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.cempty-chat{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--muted);gap:6px;font-size:.86rem;padding:30px}

/* MODAL */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.82);backdrop-filter:blur(6px);z-index:800;display:flex;align-items:flex-end;justify-content:center;padding:0}
.mo.hidden{display:none}
@media(min-width:600px){.mo{align-items:center;padding:16px}}
.mbox{background:var(--o2);border:1px solid rgba(200,146,74,.2);border-radius:var(--rL) var(--rL) 0 0;padding:26px 22px;width:100%;max-width:460px;position:relative;animation:slideUp .25s ease;max-height:90vh;overflow-y:auto}
@media(min-width:600px){.mbox{border-radius:var(--rL);animation:popIn .2s ease}}
.mbox.wide{max-width:520px}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes popIn{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:scale(1)}}
.mclose{position:absolute;top:12px;right:12px;background:var(--o4);border:none;color:var(--muted);width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:.82rem;display:flex;align-items:center;justify-content:center}
.mclose:hover{color:var(--cream)}
.mt{font-family:'Playfair Display',serif;font-size:1.25rem;font-weight:700;margin-bottom:4px}
.ms2{font-size:.82rem;color:var(--muted);margin-bottom:18px}

/* INFO BOX */
.ibox{background:rgba(200,146,74,.07);border:1px solid rgba(200,146,74,.22);border-radius:var(--r);padding:11px 13px;font-size:.82rem;color:var(--sandP);line-height:1.6;margin-bottom:14px}
.ibox-red{background:rgba(192,57,43,.07);border-color:rgba(192,57,43,.25);color:#e8a090}

/* UPLOAD */
.upz{border:2px dashed rgba(200,146,74,.3);border-radius:var(--r);padding:22px;text-align:center;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.upz:hover{border-color:var(--sand);background:rgba(200,146,74,.04)}
.upz input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.upz .ui{font-size:1.6rem;margin-bottom:5px;opacity:.3}
.upz .ut{font-size:.79rem;color:var(--muted)}
.upr{margin-top:8px;display:none}
.upr img{max-width:100%;max-height:150px;border-radius:7px}

/* PENDING */
.pi{display:flex;align-items:center;gap:10px;padding:13px 15px;border-bottom:1px solid rgba(200,146,74,.07);flex-wrap:wrap}
.pi-info{flex:1;min-width:120px}
.pi-name{font-weight:600;font-size:.9rem}
.pi-det{font-size:.74rem;color:var(--muted);margin-top:1px}
.pi-acts{display:flex;gap:5px;flex-wrap:wrap}

/* TOGGLE */
.trow{display:flex;align-items:center;gap:10px}
.tog{position:relative;width:40px;height:21px;background:var(--o4);border-radius:50px;cursor:pointer;transition:background .2s;flex-shrink:0}
.tog.on{background:var(--green)}
.tog::after{content:'';position:absolute;top:2px;left:2px;width:17px;height:17px;background:#fff;border-radius:50%;transition:left .2s}
.tog.on::after{left:21px}

/* TABS */
.tabs{display:flex;gap:5px;margin-bottom:16px}
.tb{flex:1;padding:8px 10px;background:var(--o3);border:1px solid rgba(200,146,74,.15);border-radius:var(--r);color:var(--muted);cursor:pointer;font-family:'Outfit',sans-serif;font-size:.82rem;transition:all .18s;text-align:center}
.tb.active{background:rgba(200,146,74,.15);border-color:var(--sand);color:var(--sand)}

/* EMPTY */
.empty{text-align:center;padding:48px 20px;color:var(--muted)}
.ei{font-size:2.5rem;opacity:.2;margin-bottom:12px}
.en{font-family:'Playfair Display',serif;font-size:1rem;color:var(--cream);margin-bottom:5px}

/* TOAST */
#tc{position:fixed;bottom:calc(var(--bot-h) + 10px);right:12px;z-index:9000;display:flex;flex-direction:column;gap:6px}
.toast{display:flex;align-items:center;gap:8px;background:var(--o3);border:1px solid rgba(200,146,74,.2);border-radius:9px;padding:9px 13px;font-size:.82rem;min-width:200px;max-width:290px;animation:sU .3s ease;box-shadow:var(--shadow)}
.toast.toast-error{border-color:rgba(192,57,43,.4)}.toast.toast-success{border-color:rgba(39,174,96,.35)}
@keyframes sU{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* STARS */
.stars{display:flex;gap:3px;font-size:1.3rem;cursor:pointer}
.star{opacity:.3;transition:opacity .15s}
.star.on{opacity:1}

/* PROFILE CARD */
.pcard{background:var(--o2);border:1px solid rgba(200,146,74,.15);border-radius:var(--rL);padding:20px;margin-bottom:16px;display:flex;align-items:center;gap:14px}
.pcard-info{flex:1}
.pcard-name{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700}
.pcard-role{font-size:.78rem;color:var(--muted);margin-top:2px}

/* LOADING */
.loading{display:flex;align-items:center;justify-content:center;gap:10px;padding:36px;color:var(--muted);font-size:.88rem}
.spin{width:18px;height:18px;border:2px solid rgba(200,146,74,.3);border-top-color:var(--sand);border-radius:50%;animation:spin .8s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

/* LANDING */
#page-landing{min-height:100vh;background:radial-gradient(ellipse at 30% 60%,#1a1005 0%,var(--o1) 55%)}
.lnav{padding:16px;display:flex;justify-content:center;border-bottom:1px solid rgba(200,146,74,.08)}
.llogo{font-family:'Playfair Display',serif;font-size:1.55rem;font-weight:900;color:var(--sand)}
.llogo em{font-style:normal;color:var(--muted);font-size:.65em;font-family:'Outfit',sans-serif;font-weight:300}
.lhero{display:flex;flex-direction:column;align-items:center;text-align:center;padding:50px 20px 36px}
.ley{font-size:.68rem;font-weight:600;text-transform:uppercase;letter-spacing:2.5px;color:var(--sand);margin-bottom:14px}
.lh1{font-family:'Playfair Display',serif;font-size:clamp(2.2rem,8vw,4.5rem);font-weight:900;line-height:1.05;letter-spacing:-1.5px;margin-bottom:14px}
.lh1 .hi{color:var(--sand)}
.ltag{font-size:.95rem;color:var(--muted);max-width:400px;margin-bottom:36px;line-height:1.65}
.erow{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-bottom:44px}
.ebtn{display:flex;flex-direction:column;align-items:center;gap:5px;padding:18px 22px;border-radius:var(--rL);cursor:pointer;transition:all .25s;border:1px solid rgba(200,146,74,.18);background:var(--o2);min-width:120px}
.ebtn:hover{border-color:var(--sand);transform:translateY(-3px);box-shadow:var(--glow)}
.ebtn.gold{background:linear-gradient(135deg,var(--sand),var(--sandL));border:none;color:var(--o1)}
.ebtn.gold:hover{filter:brightness(1.07)}
.ebi{font-size:1.7rem}.ebl{font-weight:700;font-size:.88rem}.ebs{font-size:.68rem;opacity:.62}
.lfeats{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;padding:0 16px 60px;max-width:800px;margin:0 auto}
.fc{padding:18px}
.fic{font-size:1.4rem;margin-bottom:9px}
.ftl{font-family:'Playfair Display',serif;font-weight:700;font-size:.9rem;margin-bottom:4px}
.fds{font-size:.78rem;color:var(--muted);line-height:1.55}

/* PRODUCT DETAIL */
.pdim{width:100%;height:200px;background:var(--o3);border-radius:var(--r);margin-bottom:12px;display:flex;align-items:center;justify-content:center;overflow:hidden}
.pdim img{width:100%;height:100%;object-fit:cover}

/* SELLER PROFILE IN MODAL */
.seller-mini{display:flex;align-items:center;gap:9px;background:var(--o3);border-radius:var(--r);padding:10px 12px;margin-bottom:14px}
.seller-stars{font-size:.8rem;color:var(--sand)}
</style>
</head>
<body>
<div id="app"></div>
<div id="tc"></div>
<div id="mo" class="mo hidden"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, collection, doc, setDoc, getDoc, getDocs, addDoc, updateDoc, deleteDoc, onSnapshot, query, orderBy, where, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA93Vdg7fDd33-0oysNk1zdgrgc8wqOnik",
  authDomain: "oasis-market-12f36.firebaseapp.com",
  projectId: "oasis-market-12f36",
  storageBucket: "oasis-market-12f36.firebasestorage.app",
  messagingSenderId: "73499000789",
  appId: "1:73499000789:web:25d0a36bef4f8a0ca2875c"
};

const fbApp = initializeApp(firebaseConfig);
const db = getFirestore(fbApp);

// ══════════════════════════════════
//  FIREBASE HELPERS
// ══════════════════════════════════
const FB = {
  async createUser(id,data){ await setDoc(doc(db,'users',id),{...data,createdAt:new Date().toLocaleDateString('fr-FR')}); },
  async getUser(id){ const d=await getDoc(doc(db,'users',id)); return d.exists()?{id:d.id,...d.data()}:null; },
  async getUserByUsername(username){ const snap=await getDocs(collection(db,'users')); const f=snap.docs.find(d=>d.data().username===username); return f?{id:f.id,...f.data()}:null; },
  async getAllUsers(){ const snap=await getDocs(collection(db,'users')); return snap.docs.map(d=>({id:d.id,...d.data()})); },
  async updateUser(id,data){ await updateDoc(doc(db,'users',id),data); },
  async addProduct(data){ const r=await addDoc(collection(db,'products'),{...data,createdAt:serverTimestamp()}); return r.id; },
  async getProducts(){ const snap=await getDocs(collection(db,'products')); return snap.docs.map(d=>({id:d.id,...d.data()})); },
  async deleteProduct(id){ await deleteDoc(doc(db,'products',id)); },
  async updateProduct(id,data){ await updateDoc(doc(db,'products',id),data); },
  async sendMessage(chatId,msg){ await addDoc(collection(db,'chats',chatId,'messages'),{...msg,ts:serverTimestamp()}); await setDoc(doc(db,'chats',chatId),{participants:chatId.split('_'),lastMsg:msg.text,lastTime:msg.time},{merge:true}); },
  async getUserChats(userId){ const snap=await getDocs(collection(db,'chats')); return snap.docs.filter(d=>d.id.includes(userId)).map(d=>({id:d.id,...d.data()})); },
  async getAllChats(){ const snap=await getDocs(collection(db,'chats')); return snap.docs.map(d=>({id:d.id,...d.data()})); },
  listenMessages(chatId,cb){ const q=query(collection(db,'chats',chatId,'messages'),orderBy('ts','asc')); return onSnapshot(q,snap=>cb(snap.docs.map(d=>({id:d.id,...d.data()})))); },
  async addNotif(userId,text,type='info'){ await addDoc(collection(db,'notifications',userId,'items'),{text,type,read:false,time:"À l'instant",ts:serverTimestamp()}); },
  async getNotifs(userId){ try{ const q=query(collection(db,'notifications',userId,'items'),orderBy('ts','desc')); const snap=await getDocs(q); return snap.docs.map(d=>({id:d.id,...d.data()})); }catch(e){return[];} },
  async markNotifsRead(userId){ try{ const snap=await getDocs(collection(db,'notifications',userId,'items')); for(const d of snap.docs) await updateDoc(d.ref,{read:true}); }catch(e){} },
  async addRating(sellerId,buyerId,buyerName,score,comment){
    await setDoc(doc(db,'ratings',`${sellerId}_${buyerId}`),{sellerId,buyerId,buyerName,score,comment,createdAt:serverTimestamp()},{merge:true});
    // Recalculate average
    const snap=await getDocs(query(collection(db,'ratings'),where('sellerId','==',sellerId)));
    const ratings=snap.docs.map(d=>d.data());
    const avg=ratings.reduce((a,r)=>a+r.score,0)/ratings.length;
    await updateDoc(doc(db,'users',sellerId),{avgRating:Math.round(avg*10)/10,ratingCount:ratings.length});
  },
  async getSellerRatings(sellerId){ const snap=await getDocs(query(collection(db,'ratings'),where('sellerId','==',sellerId))); return snap.docs.map(d=>({id:d.id,...d.data()})); }
};

const Views={

      const oth=U.cache.products.filter(p=>p.sellerId!=='admin'&&p.available!==false);
      const list=[...adm,...oth].filter(p=>{
        const ms=!q||p.name.toLowerCase().includes(q)||(p.description||'').toLowerCase().includes(q)||p.category.toLowerCase().includes(q);
        return ms&&(cat==='Toutes'||p.category===cat);
      });
      const g=document.getElementById('cgrid'); if(!g)return;
      if(!list.length){g.innerHTML=`<div class="empty"><div class="ei">🔍</div><div class="en">Aucun article trouvé</div></div>`;return;}
      g.innerHTML=`<div class="pg">${list.map(p=>Views._pcard(p)).join('')}</div>`;

        ${cats.map(c=>`<option value="${c}">${c}</option>`).join('')}
      </select>
    </div>
    <div id="cgrid"></div>`;
    window._render=render; window._cq=''; window._cc='Toutes';
    // patch input handler
    m.querySelector('.si2').addEventListener('input',function(){q=this.value;render();});
    m.querySelector('.csel').addEventListener('change',function(){cat=this.value;render();});
    render();
  },

  _pcard(p){
    const isOwner=App.cu&&(App.cu.id===p.sellerId||App.cu.role==='admin');

        <div class="cmp">
          <input class="cinp" id="ci2" placeholder="Votre message…" onkeydown="if(event.key==='Enter')ChatV.send('${tid}')">
          <button class="csnd" onclick="ChatV.send('${tid}')">➤</button>
        </div>`;
    }

    if(U.cache.unsub) U.cache.unsub();
    U.cache.unsub=FB.listenMessages(cid,msgs=>{
      const ma=document.getElementById('ma'); if(!ma)return;
      ma.innerHTML=msgs.length===0
        ?'<div style="text-align:center;color:var(--muted);font-size:.81rem;margin-top:28px">Démarrez la conversation !</div>'
        :msgs.map(msg=>{
          const mine=msg.from===App.cu.id;
          const s=U.cache.users[msg.from];
          return `<div class="mw ${mine?'mine':'other'}"><div class="mb">${msg.text}</div><div class="mm">${mine?'Vous':(s?s.name:'?')} · ${msg.time||''}</div></div>`;
        }).join('');
      setTimeout(()=>ma.scrollTop=ma.scrollHeight,40);
    });
    document.getElementById('ci2')?.focus();
  },

  _back(){
    const cl=document.getElementById('conv-list');
    const co=document.getElementById('chat-open');
    if(cl) cl.classList.remove('hidden');
    if(co) co.classList.add('hidden');
    if(U.cache.unsub){U.cache.unsub();U.cache.unsub=null;}
  },

  async send(tid){
    const inp=document.getElementById('ci2');
    const text=inp?.value.trim(); if(!text)return;
    const cid=U.cid(App.cu.id,tid);
    inp.value='';
    await FB.sendMessage(cid,{from:App.cu.id,text,time:U.time()});
  }
};
window.ChatV=ChatV;

// ══════════════════════════════════
//  SELLER ACTIONS
// ══════════════════════════════════
const Seller={
  _up(inp){
    const f=inp.files[0]; if(!f)return;
    if(f.size>5*1024*1024){T.show('Image trop lourde (max 5Mo).','error');return;}
    const r=new FileReader();
    r.onload=e=>{
      window._selImg=e.target.result;
      document.getElementById('upi').src=e.target.result;
      document.getElementById('upr').style.display='block';
      document.getElementById('upz').style.display='none';
    };
    r.readAsDataURL(f);
  },
  _clr(){ window._selImg=null; document.getElementById('upr').style.display='none'; document.getElementById('upz').style.display='block'; },
  _tog(){
    window._selDeliv=!window._selDeliv;
    document.getElementById('dtog').classList.toggle('on',window._selDeliv);
    document.getElementById('dlab').textContent=window._selDeliv?'Oui':'Non';
  },
  async submit(){
    const name=document.getElementById('an').value.trim();
    const price=parseInt(document.getElementById('apr').value);
    const desc=document.getElementById('ad').value.trim();
    const cat=document.getElementById('ac').value;
    const emoji=document.getElementById('aem').value.trim()||'📦';
    const e=document.getElementById('aerr');
    if(!name||!price||!desc){e.textContent='Remplissez tous les champs.';e.classList.add('show');return;}
    if(isNaN(price)||price<100){e.textContent='Prix invalide.';e.classList.add('show');return;}
    e.classList.remove('show');
    const btn=document.getElementById('sub-btn');
    btn.disabled=true; btn.textContent='⏳ Publication…';
    const isAdmin=App.cu.id==='admin';
    const prod={sellerId:App.cu.id,sellerName:App.cu.name,name,description:desc,price,category:cat,emoji,delivery:window._selDeliv||false,available:true,image:window._selImg||null,priority:isAdmin};
    await FB.addProduct(prod);
    window._selImg=null; window._selDeliv=false;
    T.show('Article publié ! 🎉');
    App.go('my-products');
  },
  async toggle(id,currentAvail){
    await FB.updateProduct(id,{available:!currentAvail});
    U.cache.products=await FB.getProducts();
    T.show('Article mis à jour.');
    App.go('my-products');
  },
  async del(id){
    await FB.deleteProduct(id);
    U.cache.products=U.cache.products.filter(p=>p.id!==id);
    T.show('Article supprimé.');
    App.go(App.cv);
  }
};
window.Seller=Seller;

// ══════════════════════════════════
//  ADMIN ACTIONS
// ══════════════════════════════════
const Admin={
  async val(uid){
    await FB.updateUser(uid,{status:'active'});
    const u=await FB.getUser(uid); U.cache.users[uid]=u;
    await FB.addNotif(uid,'🎉 Votre compte vendeur a été validé ! Vous pouvez publier vos articles.','success');
    const cid=U.cid(uid,'admin');
    await FB.sendMessage(cid,{from:'admin',text:`Bonjour ${u.name} ! ✅ Votre compte vendeur a été validé. Bienvenue sur OASIS Market !`,time:U.time()});
    T.show(`${u.name} validé !`); App.go('admin-pending');
  },
  async rej(uid){
    await FB.updateUser(uid,{status:'rejected'});
    const u=await FB.getUser(uid);
    await FB.addNotif(uid,"Votre demande a été refusée. Contactez l'administrateur.",'error');
    T.show(`${u?.name} refusé.`,'error'); App.go('admin-pending');
  },
  async deact(uid){
    await FB.updateUser(uid,{status:'inactive'});
    const u=await FB.getUser(uid); T.show(`${u?.name} désactivé.`,'error'); App.go('admin-users');
  },
  async react(uid){
    await FB.updateUser(uid,{status:'active'});
    const u=await FB.getUser(uid); T.show(`${u?.name} réactivé !`); App.go('admin-users');
  },
  async _sv(cid){
    document.querySelectorAll('[id^="sci-"]').forEach(el=>el.classList.remove('active'));
    const el=document.getElementById('sci-'+cid); if(el)el.classList.add('active');
    const parts=cid.split('_');
    let u1=U.cache.users[parts[0]],u2=U.cache.users[parts[1]];
    if(!u1){u1=await FB.getUser(parts[0]);if(u1)U.cache.users[parts[0]]=u1;}
    if(!u2){u2=await FB.getUser(parts[1]);if(u2)U.cache.users[parts[1]]=u2;}
    const survList=document.getElementById('surv-list');
    const survOpen=document.getElementById('surv-open');
    if(survList) survList.classList.add('hidden');
    if(survOpen){
      survOpen.classList.remove('hidden');
      survOpen.innerHTML=`
        <div class="cr-h">
          <button class="back-btn" onclick="Admin._svBack()">←</button>
          <div class="av" style="background:var(--o4)">${u1?.avatar||'?'}</div>
          <div style="font-size:.82rem"><div style="font-weight:600">${u1?.name||'?'} ↔ ${u2?.name||'?'}</div><div class="txs tmuted">Mode surveillance</div></div>
        </div>
        <div class="msgs" id="sma"><div class="loading"><div class="spin"></div></div></div>
        <div class="cmp">
          <input class="cinp" id="sinp" placeholder="Intervenir…" onkeydown="if(event.key==='Enter')Admin._ss('${cid}')">
          <button class="csnd" onclick="Admin._ss('${cid}')">➤</button>
        </div>`;
    }
    if(U.cache.unsub) U.cache.unsub();
    U.cache.unsub=FB.listenMessages(cid,msgs=>{
      const ma=document.getElementById('sma'); if(!ma)return;
      ma.innerHTML=msgs.map(msg=>{
        const s=U.cache.users[msg.from]; const mine=msg.from==='admin';
        return `<div class="mw ${mine?'mine':'other'}"><div class="mb">${msg.text}</div><div class="mm">${s?s.name:'?'} · ${msg.time||''}</div></div>`;
      }).join('')||'<div style="text-align:center;color:var(--muted);font-size:.81rem;margin-top:28px">Conversation vide</div>';
      setTimeout(()=>ma.scrollTop=ma.scrollHeight,40);
    });
  },
  _svBack(){
    const sl=document.getElementById('surv-list');
    const so=document.getElementById('surv-open');
    if(sl)sl.classList.remove('hidden');
    if(so)so.classList.add('hidden');
    if(U.cache.unsub){U.cache.unsub();U.cache.unsub=null;}
  },
  async _ss(cid){
    const inp=document.getElementById('sinp');
    const text=inp?.value.trim(); if(!text)return;
    inp.value='';
    await FB.sendMessage(cid,{from:'admin',text,time:U.time()});
  }
};
window.Admin=Admin;

// BOOT
window.addEventListener('DOMContentLoaded',()=>App.init());
</script>
</body>
</html>
