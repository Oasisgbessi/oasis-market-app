<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, collection, doc, setDoc, getDoc, getDocs, addDoc, updateDoc, deleteDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";
import { getStorage, ref, uploadString, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyA93Vdg7fDd33-0oysNk1zdgrgc8wqOnik",
  authDomain: "oasis-market-12f36.firebaseapp.com",
  projectId: "oasis-market-12f36",
  storageBucket: "oasis-market-12f36.firebasestorage.app",
  messagingSenderId: "73499000789",
  appId: "1:73499000789:web:25d0a36bef4f8a0ca2875c"
};

const fbApp = initializeApp(firebaseConfig);
const db = getFirestore(fbApp);
const storage = getStorage(fbApp);

// ════════════════════════════════════════
//  FIREBASE HELPERS
// ════════════════════════════════════════
const FB = {
  // USERS
  async createUser(id, data) {
    await setDoc(doc(db, 'users', id), { ...data, createdAt: new Date().toLocaleDateString('fr-FR') });
  },
  async getUser(id) {
    const d = await getDoc(doc(db, 'users', id));
    return d.exists() ? { id: d.id, ...d.data() } : null;
  },
  async getUserByUsername(username) {
    const snap = await getDocs(collection(db, 'users'));
    const found = snap.docs.find(d => d.data().username === username);
    return found ? { id: found.id, ...found.data() } : null;
  },
  async getAllUsers() {
    const snap = await getDocs(collection(db, 'users'));
    return snap.docs.map(d => ({ id: d.id, ...d.data() }));
  },
  async updateUser(id, data) {
    await updateDoc(doc(db, 'users', id), data);
  },

  // PRODUCTS
  async addProduct(data) {
    const ref2 = await addDoc(collection(db, 'products'), { ...data, createdAt: serverTimestamp() });
    return ref2.id;
  },
  async getProducts() {
    const snap = await getDocs(collection(db, 'products'));
    return snap.docs.map(d => ({ id: d.id, ...d.data() }));
  },
  async deleteProduct(id) {
    await deleteDoc(doc(db, 'products', id));
  },
  async updateProduct(id, data) {
    await updateDoc(doc(db, 'products', id), data);
  },

  // MESSAGES
  async sendMessage(chatId, msg) {
    await addDoc(collection(db, 'chats', chatId, 'messages'), { ...msg, ts: serverTimestamp() });
    await setDoc(doc(db, 'chats', chatId), { participants: chatId.split('_'), lastMsg: msg.text, lastTime: msg.time }, { merge: true });
  },
  async getMessages(chatId) {
    const q = query(collection(db, 'chats', chatId, 'messages'), orderBy('ts', 'asc'));
    const snap = await getDocs(q);
    return snap.docs.map(d => ({ id: d.id, ...d.data() }));
  },
  async getUserChats(userId) {
    const snap = await getDocs(collection(db, 'chats'));
    return snap.docs.filter(d => d.id.includes(userId)).map(d => ({ id: d.id, ...d.data() }));
  },
  listenMessages(chatId, cb) {
    const q = query(collection(db, 'chats', chatId, 'messages'), orderBy('ts', 'asc'));
    return onSnapshot(q, snap => cb(snap.docs.map(d => ({ id: d.id, ...d.data() }))));
  },

  // IMAGE UPLOAD
  async uploadImage(base64Data, path) {
    try {
      const storageRef = ref(storage, path);
      await uploadString(storageRef, base64Data, 'data_url');
      return await getDownloadURL(storageRef);
    } catch(e) {
      console.warn('Storage upload failed, using base64 directly');
      return base64Data; // fallback
    }
  },

  // NOTIFICATIONS
  async addNotif(userId, text, type='info') {
    await addDoc(collection(db, 'notifications', userId, 'items'), {
      text, type, read: false, time: "À l'instant", ts: serverTimestamp()
    });
  },
  async getNotifs(userId) {
    try {
      const q = query(collection(db, 'notifications', userId, 'items'), orderBy('ts', 'desc'));
      const snap = await getDocs(q);
      return snap.docs.map(d => ({ id: d.id, ...d.data() }));
    } catch(e) { return []; }
  },
  async markNotifsRead(userId) {
    try {
      const snap = await getDocs(collection(db, 'notifications', userId, 'items'));
      for (const d of snap.docs) { await updateDoc(d.ref, { read: true }); }
    } catch(e) {}
  }
};

const Seller = {
  _img: null, _deliv: false,

  async mine(m) {
    const u = App.cu;
    if (u.status === 'pending') {
      m.innerHTML = `<div class="sh"><div class="st">Mes articles</div></div>
      <div class="empty"><div class="ei">⏳</div><div class="en">Compte en attente de validation</div>
      <p style="margin-bottom:16px">L'administrateur validera votre compte après confirmation du paiement de 5 000 FCFA.</p>
      <button class="btn btn-gold" onclick="ChatV.with('admin')">💬 Contacter l'admin</button></div>`;
      return;
    }
    Cache.products = await FB.getProducts();
    const list = Cache.products.filter(p => p.sellerId === u.id);
    m.innerHTML = `<div class="sh">
      <div><div class="st">Mes articles</div><div class="ss">${list.length} article(s)</div></div>
      <button class="btn btn-gold btn-sm" onclick="App.go('add-product')">➕ Ajouter</button>
    </div>

      : `<div class="pg">${list.map(p => Seller._card(p)).join('')}</div>`}`;
  },

  _card(p) {
    return `<div class="card pc">
      <div class="pim">
        ${p.image ? `<img src="${p.image}" alt="${p.name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="pph" style="display:none">${p.emoji||'📦'}</div>` : `<div class="pph">${p.emoji||'📦'}</div>`}
        ${p.priority ? '<div class="pb1">⭐ Vedette</div>' : ''}
        ${p.delivery ? '<div class="pb2">🚚</div>' : ''}
        ${p.available === false ? '<div style="position:absolute;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;font-size:.73rem;color:#fff;font-weight:700">INDISPO</div>' : ''}
      </div>
      <div class="pbody">
        <div class="pname">${p.name}</div>
        <div class="psel">${p.category}</div>
        <div class="ppr">${Cache.price(p.price)}</div>
        <div class="pact">
          <button class="btn btn-sm btn-ghost" onclick="Seller.toggle('${p.id}',${p.available !== false})">${p.available !== false ? '⏸ Indispo' : '▶ Dispo'}</button>
          <button class="btn btn-sm btn-danger" onclick="Seller.del('${p.id}')">🗑</button>
        </div>
      </div>
    </div>`;
  },

  addForm(m) {
    if (App.cu.status === 'pending') { Seller.mine(m); return; }
    Seller._img = null; Seller._deliv = false;
    m.innerHTML = `<div class="sh"><div><div class="st">Ajouter un article</div><div class="ss">Remplissez les informations</div></div></div>
    <div class="card" style="padding:24px;max-width:580px">
      <div class="fg"><label class="fl">📸 Photo du produit</label>
        <div class="upz" id="upz"><input type="file" accept="image/*" onchange="Seller._up(this)">
          <div class="ui">🖼️</div><div class="ut">Cliquez ou déposez une photo ici<br><span style="font-size:.7rem;opacity:.5">JPG, PNG, WEBP — max 5 Mo</span></div>
        </div>
        <div class="upr" id="upr"><img id="upi" src="" alt="Aperçu">
          <button class="btn btn-ghost btn-sm" style="margin-top:7px" onclick="Seller._clr()">✕ Supprimer</button>
        </div>
      </div>
      <div class="fg"><label class="fl">Nom de l'article *</label><input class="fi" id="an" placeholder="Ex: iPhone 13 Pro"></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:13px">
        <div class="fg"><label class="fl">Catégorie *</label>
          <select class="fi" id="ac">
            <option>Téléphones</option><option>Informatique</option><option>Mode & Accessoires</option>
            <option>Électroménager</option><option>Machines</option><option>Meubles & Maison</option>
            <option>Véhicules</option><option>Alimentation</option><option>Beauté & Santé</option>
            <option>Sport & Loisirs</option><option>Autre</option>
          </select>
        </div>
        <div class="fg"><label class="fl">Prix (FCFA) *</label><input class="fi" id="apr" type="number" placeholder="Ex: 150000" min="100"></div>
      </div>
      <div class="fg"><label class="fl">Description *</label><textarea class="fi" id="ad" rows="4" placeholder="État, caractéristiques…"></textarea></div>
      <div class="fg"><label class="fl">Emoji représentatif</label><input class="fi" id="aem" placeholder="📱 👗 🛋️" maxlength="4" value="📦" style="max-width:105px"></div>
      <div class="fg"><label class="fl">Livraison disponible ?</label>
        <div class="trow"><div class="tog" id="dtog" onclick="Seller._tog()"></div><span id="dlab" style="font-size:.84rem">Non</span></div>
      </div>
      <div class="ferr" id="aerr"></div>
      <div style="display:flex;gap:9px;margin-top:8px">
        <button class="btn btn-gold" id="sub-btn" onclick="Seller.submit()">🚀 Publier l'article</button>
        <button class="btn btn-ghost" onclick="App.go('my-products')">Annuler</button>
      </div>
    </div>`;
  },

  _up(inp) {
    const f = inp.files[0]; if (!f) return;
    if (f.size > 5 * 1024 * 1024) { T.show('Image trop lourde (max 5Mo).', 'error'); return; }
    const r = new FileReader();
    r.onload = e => {
      Seller._img = e.target.result;
      document.getElementById('upi').src = e.target.result;
      document.getElementById('upr').style.display = 'block';
      document.getElementById('upz').style.display = 'none';
    };
    r.readAsDataURL(f);
  },

  _clr() { Seller._img = null; document.getElementById('upr').style.display = 'none'; document.getElementById('upz').style.display = 'block'; },
  _tog() {
    Seller._deliv = !Seller._deliv;
    document.getElementById('dtog').classList.toggle('on', Seller._deliv);
    document.getElementById('dlab').textContent = Seller._deliv ? 'Oui — livraison disponible' : 'Non';
  },

  async submit() {
    const name = document.getElementById('an').value.trim();
    const price = parseInt(document.getElementById('apr').value);
    const desc = document.getElementById('ad').value.trim();
    const cat = document.getElementById('ac').value;
    const emoji = document.getElementById('aem').value.trim() || '📦';
    const e = document.getElementById('aerr');
    if (!name || !price || !desc) { e.textContent = 'Veuillez remplir tous les champs.'; e.classList.add('show'); return; }
    if (isNaN(price) || price < 100) { e.textContent = 'Prix invalide.'; e.classList.add('show'); return; }
    e.classList.remove('show');

    const btn = document.getElementById('sub-btn');
    btn.disabled = true; btn.textContent = '⏳ Publication…';

    const isAdmin = App.cu.id === 'admin';
    let imageUrl = null;

    if (Seller._img) {
      imageUrl = await FB.uploadImage(Seller._img, `products/${Date.now()}_${name}`);
    }

    const prod = {
      sellerId: App.cu.id,
      sellerName: App.cu.name,
      name, description: desc, price,
      category: cat, emoji,
      delivery: Seller._deliv,
      available: true,
      image: imageUrl,
      priority: isAdmin
    };

    await FB.addProduct(prod);
    Seller._img = null; Seller._deliv = false;
    T.show('Article publié avec succès ! 🎉');
    App.go('my-products');
  },

  async toggle(id, currentAvail) {
    await FB.updateProduct(id, { available: !currentAvail });
    Cache.products = await FB.getProducts();
    T.show(`Article mis à jour.`);
    App.go(App.cv);
  },

  async del(id) {
    await FB.deleteProduct(id);
    Cache.products = Cache.products.filter(p => p.id !== id);
    T.show('Article supprimé.');
    App.go(App.cv);
  }
};
window.Seller = Seller;

const ChatV = {
  _active: null,

  async render(m) {
    const convs = await FB.getUserChats(App.cu.id);
    m.innerHTML = `<div class="sh"><div><div class="st">Messages</div><div class="ss">Vos conversations</div></div></div>
    <div class="cs">
      <div class="cl"><div class="cl-h">💬 Conversations</div><div id="cvl">${await ChatV._listHTML(convs)}</div></div>
      <div class="cr" id="cr"><div class="cempty"><div class="bi">💬</div><p>Sélectionnez une conversation</p></div></div>
    </div>`;
  },

  async _listHTML(convs) {
    if (!convs.length) return `<div style="padding:16px;text-align:center;color:var(--muted);font-size:.81rem">Aucune conversation.<br>Cliquez 💬 depuis un article.</div>`;
    let html = '';
    for (const c of convs) {
      const parts = c.id.split('_');
      const otherId = parts.find(p => p !== App.cu.id);
      let other = Cache.users[otherId];
      if (!other) { other = await FB.getUser(otherId); if (other) Cache.users[otherId] = other; }
      if (!other) continue;
      html += `<div class="ci" id="ci-${c.id}" onclick="ChatV.open('${otherId}')">
        <div class="av">${other.avatar||other.name[0]}</div>
        <div><div class="ci-nm">${other.name}</div><div class="ci-pv">${c.lastMsg||''}</div></div>
      </div>`;
    }
    return html || `<div style="padding:16px;text-align:center;color:var(--muted);font-size:.81rem">Aucune conversation.</div>`;
  },

  with(targetId) { App.go('chat'); setTimeout(() => ChatV.open(targetId), 200); },

  async open(tid) {
    let target = Cache.users[tid];
    if (!target) { target = await FB.getUser(tid); if (target) Cache.users[tid] = target; }
    if (!target) return;

    ChatV._active = tid;
    const cid = Cache.cid(App.cu.id, tid);

    document.querySelectorAll('.ci').forEach(el => el.classList.remove('active'));
    const ci = document.getElementById('ci-' + cid);
    if (ci) ci.classList.add('active');

    const cr = document.getElementById('cr'); if (!cr) return;
    cr.innerHTML = `
      <div class="cr-h"><div class="av">${target.avatar||target.name[0]}</div>
        <div><div style="font-weight:600">${target.name}</div>
        <div class="txs tmuted">${target.role === 'admin' ? '👑 Administrateur' : target.role === 'seller' ? '🏪 Vendeur' : '🛒 Acheteur'}</div></div>
      </div>
      <div class="msgs" id="ma"><div class="loading"><div class="spin"></div></div></div>
      <div class="cmp">
        <input class="cinp" id="ci2" placeholder="Votre message…" onkeydown="if(event.key==='Enter')ChatV.send('${tid}')">
        <button class="csnd" onclick="ChatV.send('${tid}')">➤</button>
      </div>`;

    // Live listener
    if (Cache.chatUnsubscribe) Cache.chatUnsubscribe();
    Cache.chatUnsubscribe = FB.listenMessages(cid, msgs => {
      const ma = document.getElementById('ma'); if (!ma) return;
      ma.innerHTML = msgs.length === 0
        ? '<div style="text-align:center;color:var(--muted);font-size:.81rem;margin-top:32px">Démarrez la conversation !</div>'
        : msgs.map(msg => {
            const mine = msg.from === App.cu.id;
            const s = Cache.users[msg.from];
            return `<div class="mw ${mine ? 'mine' : 'other'}"><div class="mb">${msg.text}</div><div class="mm">${mine ? 'Vous' : (s ? s.name : '?')} · ${msg.time||''}</div></div>`;
          }).join('');
      setTimeout(() => ma.scrollTop = ma.scrollHeight, 40);
    });

    document.getElementById('ci2')?.focus();
  },

  async send(tid) {
    const inp = document.getElementById('ci2');
    const text = inp?.value.trim(); if (!text) return;
    const cid = Cache.cid(App.cu.id, tid);
    inp.value = '';
    await FB.sendMessage(cid, { from: App.cu.id, text, time: Cache.time() });
  }
};
window.ChatV = ChatV;

    App.go('admin-pending');
  },

  async deact(uid) {
    await FB.updateUser(uid, { status: 'inactive' });
    const u = await FB.getUser(uid);
    T.show(`${u?.name} désactivé.`, 'error');
    App.go('admin-users');
  },

  async react(uid) {
    await FB.updateUser(uid, { status: 'active' });
    const u = await FB.getUser(uid);
    T.show(`${u?.name} réactivé !`);
    App.go('admin-users');
  }
};
window.Admin = Admin;

// BOOT
window.addEventListener('DOMContentLoaded', () => App.init());
</script>
</body>
</html>
